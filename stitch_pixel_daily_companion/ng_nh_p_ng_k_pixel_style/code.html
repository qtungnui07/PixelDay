<script>
        // Simple script to handle password visibility toggle
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtns = document.querySelectorAll('button[aria-label="Toggle password visibility"]');
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    if (input.type === 'password') {
                        input.type = 'text';
                        this.textContent = 'visibility';
                        this.classList.add('text-primary');
                        this.classList.remove('text-outline');
                    } else {
                        input.type = 'password';
                        this.textContent = 'visibility_off';
                        this.classList.remove('text-primary');
                        this.classList.add('text-outline');
                    }
                });
            });
        });
    </script>
